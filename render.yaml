services:
  - type: web
    name: vayu-ml-service
    runtime: python
    rootDir: ml_model
    buildCommand: pip install -r requirements.txt
    startCommand: python ml_service.py
    plan: free

  - type: web
    name: vayu-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: ML_SERVICE_URL
        value: https://vayu-ml-service.onrender.com
      - key: FRONTEND_URL
        value: https://vayu-frontend-ijqv.onrender.com
