# render.yaml — Vāyu Project
# Place this file in the ROOT of your GitHub repository.
#
# Deploys two services:
#   1. vayu-ml-service  — Python Flask (port auto-assigned by Render)
#   2. vayu-backend     — Node.js Express (port auto-assigned by Render)
#
# After BOTH services are deployed, update FRONTEND_URL in vayu-backend
# to your Vercel URL (e.g. https://vayu.vercel.app).
#
# The ML service URL is connected via Render's internal networking using
# the service name — no hardcoded subdomains needed.

services:

  # ── 1. Python ML Service ──────────────────────────────────────────
  - type: web
    name: vayu-ml-service
    runtime: python
    rootDir: ml_model
    buildCommand: pip install -r requirements.txt && cp ../Backend/data/city_data.json ./city_data.json
    startCommand: python ml_service.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CITY_DATA_PATH
        value: /opt/render/project/src/ml_model/city_data.json

  # ── 2. Node.js Backend ────────────────────────────────────────────
  - type: web
    name: vayu-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20.0.0"
      - key: NODE_ENV
        value: production
      # Internal Render URL — uses service name, no hardcoding
      # Format: https://<service-name>.onrender.com
      # Replace with your actual ML service URL after first deploy
      - key: ML_SERVICE_URL
        value: https://vayu-ml-service.onrender.com
      # Set this to your Vercel URL after deploying the frontend
      # Example: https://vayu.vercel.app
      - key: FRONTEND_URL
        fromInput: true