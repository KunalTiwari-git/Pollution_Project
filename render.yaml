services:

  # ── 1. Python ML Service ───
  - type: web
    name: vayu-ml-service
    runtime: python
    rootDir: ml_model
    buildCommand: pip install -r requirements.txt && cp ../Backend/data/city_data.json ./city_data.json
    startCommand: python ml_service.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CITY_DATA_PATH
        value: /opt/render/project/src/ml_model/city_data.json

  # ── 2. Node.js Backend ────
  - type: web
    name: vayu-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20.0.0"
      - key: NODE_ENV
        value: production
      - key: ML_SERVICE_URL
        value: https://vayu-ml-service.onrender.com
      - key: FRONTEND_URL
        sync: false